name: Security Scan

# This workflow is now part of the unified CI pipeline in ci.yml.
# It remains available for manual invocation when needed.
on:
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python security scanners
        run: pip install bandit pip-audit

      - name: Run bandit
        run: bandit -r src/ scripts/ -ll

      - name: Run pip-audit
        run: pip-audit -r src/requirements.txt --desc

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Run truffleHog secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --only-verified
