name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  verify:
    name: Verify CI Status on Latest Main
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    steps:
      - name: Query Checks API for latest main commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          REPO="${{ github.repository }}"
          LATEST_SHA=$(gh api "repos/${REPO}/commits/main" --jq '.sha')
          echo "Latest main SHA: ${LATEST_SHA}"

          CHECKS_JSON=$(gh api "repos/${REPO}/commits/${LATEST_SHA}/check-runs" --jq '.check_runs')

          FAILED_CHECKS=$(echo "$CHECKS_JSON" | jq -r '[.[] | select(.conclusion == "failure") | .name] | .[]')

          if [ -n "$FAILED_CHECKS" ]; then
            echo "::error::The following required checks failed on main (${LATEST_SHA}):"
            echo "$FAILED_CHECKS"
            exit 1
          fi

          PENDING_CHECKS=$(echo "$CHECKS_JSON" | jq -r '[.[] | select(.status != "completed") | .name] | .[]')
          if [ -n "$PENDING_CHECKS" ]; then
            echo "::warning::The following checks are still pending on main (${LATEST_SHA}):"
            echo "$PENDING_CHECKS"
            echo "Proceeding with caution..."
          fi

          echo "All completed checks passed for ${LATEST_SHA}. Deployment authorized."

  deploy:
    name: Deploy to GCP
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_SA_KEY }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve -input=false
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Deploy Cloud Function
        run: |
          gcloud functions deploy scc-processor \
            --gen2 \
            --runtime=python311 \
            --source=src \
            --entry-point=scc_processor.main.process_scc_finding \
            --trigger-topic=scc-findings \
            --service-account=scc-processor@${{ vars.GCP_PROJECT_ID }}.iam.gserviceaccount.com \
            --region=${{ vars.GCP_REGION }}
