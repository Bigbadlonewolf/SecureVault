name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt
          pip install pytest==8.2.2

      - name: Run pytest
        run: pytest -q

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install Python security scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit==1.7.9 pip-audit==2.7.3

      - name: Run bandit
        run: bandit -r src/ scripts/ -ll

      - name: Run pip-audit
        run: pip-audit -r src/requirements.txt --desc

      - name: Run Checkov on Terraform
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          quiet: true
          soft_fail: false

      - name: Run truffleHog secret scan
        uses: trufflesecurity/trufflehog@v3.80.1
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.base_ref || '' }}
          head: ${{ github.event_name == 'pull_request' && github.head_ref || 'HEAD' }}
          extra_args: --only-verified

  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest
    # Only run in the canonical repo where GCP secrets are configured.
    if: github.repository == 'Bigbadlonewolf/SecureVault'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Check for GCP credentials
        id: gcp_creds
        run: |
          if [ -n "${{ secrets.GCP_TERRAFORM_SA_KEY }}" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.5.7'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        if: steps.gcp_creds.outputs.available == 'true'
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_SA_KEY }}

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        if: steps.gcp_creds.outputs.available == 'true'
        working-directory: terraform
        run: terraform plan -no-color -input=false -out=plan.tfplan
        env:
          TF_VAR_alert_email: ${{ secrets.ALERT_EMAIL }}

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request' && steps.gcp_creds.outputs.available == 'true'
        with:
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>
            \`\`\`\n            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Report plan skip status
        if: always()
        run: |
          if [ "${{ steps.gcp_creds.outputs.available }}" = "true" ]; then
            echo "GCP_TERRAFORM_SA_KEY is configured; terraform plan ran (or attempted to run)."
          else
            echo "GCP_TERRAFORM_SA_KEY not configured; skipped terraform plan (fmt/init/validate still ran)."
          fi
